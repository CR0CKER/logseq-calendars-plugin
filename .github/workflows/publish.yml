name: Build plugin

on:
  push:
    tags:
      - '*'

# Least privilege: only creating a release needs write access to contents.
permissions:
  contents: write

env:
  PLUGIN_NAME: logseq-ical-sync

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.x'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: |
          npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp README.md package.json icon.png ${{ env.PLUGIN_NAME }}
          mv dist ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip ${{ env.PLUGIN_NAME }}
      - name: Create Release
        # SHA-pinned (audit L2). ncipollo attaches assets via `artifacts`, so the
        # deprecated actions/upload-release-asset steps are no longer needed.
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          draft: false
          prerelease: false
          artifacts: "${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip,package.json"
          artifactErrorsFailBuild: true
