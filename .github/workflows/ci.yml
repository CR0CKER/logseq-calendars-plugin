name: CI

# Runs on every PR and on pushes to main. The build is the blocking gate.
# typecheck and audit are informational for now (the codebase isn't strict-clean
# and the dependency tree carries known advisories) — promote them to required
# checks once the typing/dependency buckets land. See tsconfig.json ratchet note.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.x'
          cache: npm
      - name: Install dependencies (reproducible)
        run: npm ci
      - name: Build (blocking)
        run: npm run build
      # Package the built plugin so it can be downloaded and loaded unpacked in
      # Logseq for testing without a local build (see RELEASE.md).
      - name: Package plugin
        run: |
          mkdir logseq-ical-sync
          cp README.md package.json icon.png logseq-ical-sync/
          cp -r dist logseq-ical-sync/
      - name: Upload unpacked plugin artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: logseq-ical-sync-unpacked
          path: logseq-ical-sync

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.x'
          cache: npm
      # Tests exercise ./parsing only (url-regex-safe is mocked), so native
      # modules aren't needed — skip the gyp builds for speed.
      - run: npm ci --ignore-scripts
      - name: Unit tests (blocking)
        run: npm test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Type-check (blocking)
        run: npm run typecheck

  audit:
    runs-on: ubuntu-latest
    # Non-blocking until the dependency-cleanup buckets land (drop axios, etc.).
    # Dependabot (see .github/dependabot.yml) drives the deps down over time.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.x'
      - name: npm audit (informational, high+)
        run: npm audit --audit-level=high
